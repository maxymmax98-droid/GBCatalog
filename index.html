<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workshop REISAIN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= ТЕМЫ ================= */
        :root {
            --p: #ffffff;
            --pg: rgba(255, 255, 255, 0.2);
            --bg: #050505;
            --pn: rgba(20, 20, 20, 0.8);
            --txt: #ffffff;
            --sub: #8892b0;
            --brd: 1px solid rgba(255, 255, 255, 0.1);
            --blur: blur(12px);
        }

        [data-theme="blue"] {
            --p: #0077ff;
            --pg: rgba(0, 119, 255, 0.8);
            --bg: #020617;
            --pn: rgba(15, 23, 42, 0.85);
            --brd: 1px solid rgba(0, 119, 255, 0.3);
        }

        [data-theme="green"] {
            --p: #00ff88;
            --pg: rgba(0, 255, 136, 0.6);
            --bg: #050a08;
            --pn: rgba(10, 20, 15, 0.85);
            --brd: 1px solid rgba(0, 255, 136, 0.3);
        }

        [data-fx="off"] { --blur: none; --pg: transparent; }

        /* ================= BASE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
            font-size: 16px;
        }

        .app-wrapper { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

        /* ================= SIDEBAR ================= */
        .sidebar {
            background: rgba(0, 0, 0, 0.2);
            border-right: var(--brd);
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            backdrop-filter: var(--blur);
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
            padding-bottom: 25px;
            border-bottom: var(--brd);
        }
        .logo-icon { color: var(--p); filter: drop-shadow(0 0 10px var(--pg)); transition: 0.3s; }
        .logo-text h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; line-height: 1; color: var(--txt); }
        .logo-text .sub-box { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .logo-text span { font-size: 14px; font-weight: 900; color: var(--p); letter-spacing: 3px; transition: 0.3s; }
        .logo-v-badge { font-size: 10px; background: var(--p); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 900; letter-spacing: 0; }

        .nav-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .nav-btn {
            background: transparent;
            border: none;
            color: var(--sub);
            padding: 16px 20px;
            border-radius: 14px;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
        }
        .nav-btn i { font-size: 18px; width: 24px; text-align: center; }
        .nav-btn:hover { color: var(--txt); background: rgba(255,255,255,0.05); }
        .nav-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p);
            box-shadow: inset 4px 0 0 var(--p);
        }
        
        .nav-btn.special {
            margin-top: 10px;
            color: var(--p);
            opacity: 0.8;
            border: 1px dashed var(--pg);
        }
        .nav-btn.special:hover { opacity: 1; background: var(--pg); }

        .wip-btn-sidebar {
            margin-top: 10px;
            padding: 16px 20px;
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.3), rgba(0,0,0,0.3) 10px, rgba(20,20,20,0.3) 10px, rgba(20,20,20,0.3) 20px);
            border: 1px dashed #444;
            color: #666;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            position: relative;
            overflow: hidden;
        }
        .wip-btn-sidebar::after {
            content: "WIP";
            position: absolute;
            font-size: 7px;
            font-weight: 900;
            background: #f1c40f;
            color: #000;
            padding: 1px 15px;
            top: 5px;
            right: -15px;
            transform: rotate(45deg);
        }

        /* ================= CONTENT ================= */
        .content { overflow-y: auto; padding: 40px; position: relative; scroll-behavior: smooth; }
        .section-header { margin-bottom: 35px; }
        .section-header h2 { font-size: 32px; font-weight: 900; text-transform: uppercase; color: var(--p); letter-spacing: 1px; transition: 0.3s; }

        .section { display: none; animation: slideIn 0.3s ease-out; }
        .section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sub-nav {
            display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 16px; border: var(--brd); margin-bottom: 30px;
        }
        .sub-btn {
            flex: 1; padding: 14px; border: none; background: none; color: var(--sub); cursor: pointer; border-radius: 10px; font-size: 20px; transition: 0.3s;
        }
        .sub-btn.active { background: var(--p); color: #000; box-shadow: 0 0 20px var(--pg); }

        .card {
            background: var(--pn); border: var(--brd); padding: 30px; border-radius: 25px; border-left: 5px solid var(--p); margin-bottom: 25px; transition: 0.3s;
        }

        .stat-val { font-size: 64px; font-weight: 900; color: var(--p); text-shadow: 0 0 15px var(--pg); transition: 0.3s; }

        /* ================= VERSION TAG ================= */
        .version-tag {
            position: fixed; bottom: 20px; right: 20px; font-size: 11px; font-weight: 800; color: var(--sub); opacity: 0.5; z-index: 1000; letter-spacing: 1px;
        }

        /* ================= SETTINGS UI ================= */
        .setting-row {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .setting-row:last-child { border: none; }
        .switch { position: relative; width: 54px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 34px; transition: 0.3s; }
        .switch input:checked + .slider { background: var(--p); }
        .slider:before { content: ""; position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
        .switch input:checked + .slider:before { transform: translateX(26px); }

        select, .action-btn {
            background: #000; color: #fff; border: var(--brd); padding: 12px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }
        .action-btn:hover { background: #111; transform: translateY(-2px); }

        /* ================= NOTIFICATIONS ================= */
        #toast-container {
            position: fixed; top: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none;
        }
        .toast {
            background: var(--pn); border: var(--brd); border-left: 4px solid var(--p); color: #fff; padding: 16px 24px; border-radius: 16px; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; min-width: 280px; transform: translateX(120%); transition: 0.3s; pointer-events: all;
        }
        .toast.show { transform: translateX(0); }

        /* ================= MODALS ================= */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .overlay.active { display: flex; }
        .modal {
            background: var(--bg); border: var(--brd); border-top: 5px solid var(--p);
            padding: 40px; border-radius: 30px; max-width: 450px; width: 90%; text-align: center; transition: 0.3s;
        }

        .changelog-box {
            text-align: left; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; max-height: 320px; overflow-y: auto; margin: 20px 0; border: var(--brd);
            scroll-behavior: smooth;
        }
        .changelog-box::-webkit-scrollbar { width: 6px; }
        .changelog-box::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }

        .ch-item { margin-bottom: 20px; border-left: 3px solid var(--p); padding-left: 15px; }
        .ch-date { font-size: 11px; color: var(--p); font-weight: 900; text-transform: uppercase; display: block; margin-bottom: 6px; }
        .ch-txt { font-size: 13px; color: var(--txt); line-height: 1.5; font-weight: 500; }
        .ch-tag { font-size: 9px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; margin-right: 5px; color: var(--sub); font-weight: 800; vertical-align: middle; }

        .empty-state {
            display: flex; align-items: center; gap: 15px; padding: 25px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px dashed rgba(255,255,255,0.1); color: var(--sub);
        }

        /* ================= MOBILE NAVIGATION & MENU ================= */
        .mobile-more-menu {
            position: fixed; bottom: 85px; right: 20px; background: var(--pn); border: var(--brd); border-radius: 20px;
            display: none; flex-direction: column; min-width: 200px; padding: 10px; backdrop-filter: var(--blur); z-index: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); border-bottom: 4px solid var(--p);
        }
        .mobile-more-menu.active { display: flex; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .more-item {
            padding: 15px; color: var(--txt); display: flex; align-items: center; gap: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px;
        }
        .more-item:active { background: rgba(255,255,255,0.05); }
        .more-item.wip { color: var(--sub); opacity: 0.6; }

        @media (max-width: 768px) {
            #toast-container { top: auto; bottom: 100px; right: 20px; left: 20px; }
            .toast { transform: translateY(120%); min-width: auto; }
            .toast.show { transform: translateY(0); }
            .app-wrapper { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .mobile-nav {
                display: flex !important; position: fixed; bottom: 0; width: 100%; background: rgba(5, 5, 5, 0.95); border-top: var(--brd); justify-content: space-around; padding: 10px 0; backdrop-filter: blur(20px); z-index: 500;
            }
            .mobile-nav .nav-btn {
                flex-direction: column; gap: 4px; padding: 8px; align-items: center; flex: 1; background: none !important; box-shadow: none !important; margin: 0 !important;
            }
            .mobile-nav .nav-btn span { font-size: 10px; text-transform: uppercase; font-weight: 800; display: inline-block !important; color: var(--sub); }
            .mobile-nav .nav-btn.active span { color: var(--p); }
            .mobile-nav .nav-btn i { font-size: 20px; }
            .content { padding: 25px 20px; padding-bottom: 100px; }
            .section-header h2 { font-size: 26px; }
            .version-tag { display: none; }
        }
    </style>
</head>
<body data-theme="dark" data-fx="on" onclick="closeMoreMenu(event)">

    <div class="version-tag" id="v-tag-corner">V1.0.6</div>
    <div id="toast-container"></div>

    <!-- Модалка Сброса -->
    <div class="overlay" id="modal-reset">
        <div class="modal">
            <h2 id="m-reset-title" style="margin-bottom:15px; text-transform: uppercase;">Сбросить?</h2>
            <p id="m-reset-desc" style="color:var(--sub); margin-bottom:25px">Все данные будут удалены. Уверен?</p>
            <div style="display:flex; gap:12px">
                <button class="action-btn" style="flex:1" onclick="closeM('modal-reset')" data-lang="btn_no">НЕТ</button>
                <button class="action-btn" style="flex:1; background:#ff4757; border:none" onclick="confirmReset()" data-lang="btn_yes">ДА</button>
            </div>
        </div>
    </div>

    <!-- Модалка Чейнджлога -->
    <div class="overlay" id="modal-changelog">
        <div class="modal">
            <h2 data-lang="changelog_title" style="margin-bottom:5px; text-transform: uppercase;">История версий</h2>
            <p style="color:var(--p); font-weight: 800; font-size: 12px;">The Evolution</p>
            <div class="changelog-box" id="changelog-list"></div>
            <button class="action-btn" style="width:100%" onclick="closeM('modal-changelog')" data-lang="btn_close">ПОНЯЛ</button>
        </div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-cube fa-3x logo-icon"></i>
                <div class="logo-text">
                    <h1>WORKSHOP</h1>
                    <div class="sub-box">
                        <span>REISAIN</span>
                        <div class="logo-v-badge" id="v-badge-logo">V1.0.6</div>
                    </div>
                </div>
            </div>
            <div class="nav-list">
                <button class="nav-btn" id="btn-cat" onclick="nav('cat')"><i class="fas fa-folder"></i> <span data-lang="nav_cat">Категории</span></button>
                <button class="nav-btn" id="btn-prof" onclick="nav('prof')"><i class="fas fa-user-circle"></i> <span data-lang="nav_prof">Профиль</span></button>
                <button class="nav-btn" id="btn-set" onclick="nav('set')"><i class="fas fa-cog"></i> <span data-lang="nav_set">Настройки</span></button>
                
                <div style="margin-top: auto; padding-top: 20px; border-top: var(--brd);">
                    <button class="nav-btn special" onclick="openM('modal-changelog')"><i class="fas fa-history"></i> <span data-lang="changelog_title">История версий</span></button>
                    <div class="wip-btn-sidebar" onclick="showToast('Функция в разработке', 'hammer')">
                        <i class="fas fa-plus-circle"></i>
                        <span data-lang="btn_add_mod">Добавить мод</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="content">
            <div class="section-header">
                <h2 id="page-title">Категории</h2>
            </div>

            <section id="sec-cat" class="section">
                <div class="sub-nav">
                    <button class="sub-btn active" id="sub-mods" onclick="subTab('mods')"><i class="fas fa-plug"></i></button>
                    <button class="sub-btn" id="sub-saves" onclick="subTab('saves')"><i class="fas fa-hdd"></i></button>
                    <button class="sub-btn" id="sub-maps" onclick="subTab('maps')"><i class="fas fa-globe-americas"></i></button>
                </div>
                <div id="cat-content"></div>
            </section>

            <section id="sec-prof" class="section">
                <div class="card">
                    <h3 data-lang="total_loads" style="color:var(--sub); text-transform:uppercase; font-size:14px; letter-spacing:2px">Всего загрузок</h3>
                    <div class="stat-val" id="count-display">0</div>
                    <button class="action-btn" style="width:100%; margin-top:20px; background:rgba(255, 71, 87, 0.1); color:#ff4757; border:1px solid rgba(255, 71, 87, 0.3)" onclick="openM('modal-reset')" data-lang="btn_reset">Сбросить статистику</button>
                </div>
            </section>

            <section id="sec-set" class="section">
                <div class="card">
                    <div class="setting-row">
                        <div>
                            <h4 data-lang="set_theme">Выбор темы</h4>
                            <p data-lang="set_theme_sub" style="font-size:12px; color:var(--sub)">Стиль интерфейса</p>
                        </div>
                        <select id="theme-sel" onchange="saveAll()">
                            <option value="dark">Deep Dark</option>
                            <option value="blue">Neon Blue</option>
                            <option value="green">Cyber Green</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <div>
                            <h4 data-lang="set_fx">Визуальные эффекты</h4>
                            <p data-lang="set_fx_sub" style="font-size:12px; color:var(--sub)">Блюр и свечение</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="fx-check" checked onchange="saveAll()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <div>
                            <h4 data-lang="set_lang">Язык интерфейса</h4>
                            <p data-lang="set_lang_sub" style="font-size:12px; color:var(--sub)">Локализация приложения</p>
                        </div>
                        <select id="lang-sel" onchange="changeLang()">
                            <option value="ru">Русский</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Мобильное Меню "Три точки" -->
    <div class="mobile-more-menu" id="mobile-more-menu">
        <div class="more-item" onclick="toggleMoreMenu(); openM('modal-changelog')">
            <i class="fas fa-history"></i> <span data-lang="changelog_title">История версий</span>
        </div>
        <div class="more-item wip" onclick="showToast('Функция в разработке', 'hammer')">
            <i class="fas fa-plus-circle"></i> <span data-lang="btn_add_mod">Добавить мод</span>
        </div>
    </div>

    <nav class="mobile-nav" style="display:none">
        <button class="nav-btn" id="m-btn-cat" onclick="nav('cat')">
            <i class="fas fa-folder"></i>
            <span data-lang="nav_cat">Категории</span>
        </button>
        <button class="nav-btn" id="m-btn-prof" onclick="nav('prof')">
            <i class="fas fa-user-circle"></i>
            <span data-lang="nav_prof">Профиль</span>
        </button>
        <button class="nav-btn" id="m-btn-set" onclick="nav('set')">
            <i class="fas fa-cog"></i>
            <span data-lang="nav_set">Настройки</span>
        </button>
        <button class="nav-btn" id="m-btn-more" onclick="toggleMoreMenu(event)">
            <i class="fas fa-ellipsis-v"></i>
            <span data-lang="nav_more">Еще</span>
        </button>
    </nav>

    <script>
        const VERSION = "V1.0.6";
        
        const UPDATES = [
            {
                date: "21.02.2026",
                text: "<span class='ch-tag'>V1.0.6</span> <b>MOBILE UPGRADE:</b><br>• Добавлено выпадающее меню 'Три точки' для мобильных устройств.<br>• Оптимизирована нижняя навигация.<br>• Исправлены отступы контента на смартфонах."
            },
            {
                date: "20.02.2026",
                text: "<span class='ch-tag'>DAY 1</span> <b>GENESIS:</b><br>• Внедрен движок тем и система FX.<br>• Реализована локализация RU/EN.<br>• Создана структура категорий."
            }
        ];

        const i18n = {
            ru: {
                nav_cat: "Категории", nav_prof: "Профиль", nav_set: "Настройки", nav_more: "Еще",
                page_cat: "Категории", page_prof: "Профиль", page_set: "Настройки",
                empty_text: "В этом разделе пока ничего нет",
                total_loads: "Всего загрузок", btn_reset: "Сбросить статистику",
                set_theme: "Выбор темы", set_theme_sub: "Стиль интерфейса",
                set_fx: "Визуальные эффекты", set_fx_sub: "Блюр и свечение",
                set_lang: "Язык интерфейса", set_lang_sub: "Локализация приложения",
                changelog_title: "История версий",
                m_reset_title: "Сбросить?", m_reset_desc: "Все данные будут удалены. Уверен?",
                btn_yes: "ДА", btn_no: "НЕТ", btn_close: "ПОНЯЛ",
                btn_add_mod: "Добавить мод",
                toast_saved: "Настройки сохранены", toast_reset: "Статистика обнулена",
                toast_lang: "Язык обновлен"
            },
            en: {
                nav_cat: "Categories", nav_prof: "Profile", nav_set: "Settings", nav_more: "More",
                page_cat: "Categories", page_prof: "Profile", page_set: "Settings",
                empty_text: "This section is empty for now",
                total_loads: "Total Loads", btn_reset: "Reset Stats",
                set_theme: "Theme", set_theme_sub: "UI Appearance",
                set_fx: "Visual Effects", set_fx_sub: "Blur and glows",
                set_lang: "Language", set_lang_sub: "App localization",
                changelog_title: "Changelog",
                m_reset_title: "Reset?", m_reset_desc: "All data will be cleared. Sure?",
                btn_yes: "YES", btn_no: "NO", btn_close: "GOT IT",
                btn_add_mod: "Add Mod",
                toast_saved: "Settings saved", toast_reset: "Stats reset",
                toast_lang: "Language updated"
            }
        };

        let state = {
            stats: parseInt(localStorage.getItem('rs_stats')) || 0,
            theme: localStorage.getItem('rs_theme') || 'dark',
            fx: localStorage.getItem('rs_fx') !== 'false',
            lang: localStorage.getItem('rs_lang') || 'ru',
            tab: localStorage.getItem('rs_tab') || 'cat',
            subTab: localStorage.getItem('rs_subtab') || 'mods'
        };

        function init() {
            document.getElementById('count-display').innerText = state.stats;
            document.getElementById('theme-sel').value = state.theme;
            document.getElementById('fx-check').checked = state.fx;
            document.getElementById('lang-sel').value = state.lang;
            document.getElementById('v-tag-corner').innerText = VERSION;
            document.getElementById('v-badge-logo').innerText = VERSION;
            
            renderChangelog();
            applySettings();
            updateLangUI();
            nav(state.tab);
            subTab(state.subTab);
        }

        function toggleMoreMenu(e) {
            if(e) e.stopPropagation();
            document.getElementById('mobile-more-menu').classList.toggle('active');
        }

        function closeMoreMenu(e) {
            const menu = document.getElementById('mobile-more-menu');
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        }

        function renderChangelog() {
            const list = document.getElementById('changelog-list');
            list.innerHTML = UPDATES.map(upd => `
                <div class="ch-item">
                    <span class="ch-date">${upd.date}</span>
                    <p class="ch-txt">${upd.text}</p>
                </div>
            `).join('');
        }

        function nav(id) {
            state.tab = id;
            localStorage.setItem('rs_tab', id);
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id)?.classList.add('active');
            document.getElementById('m-btn-' + id)?.classList.add('active');

            document.getElementById('page-title').innerText = i18n[state.lang]['page_' + id];
        }

        function subTab(id) {
            state.subTab = id;
            localStorage.setItem('rs_subtab', id);
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sub-' + id)?.classList.add('active');
            
            document.getElementById('cat-content').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-info-circle"></i>
                    <span>${i18n[state.lang].empty_text}</span>
                </div>
            `;
        }

        function changeLang() {
            state.lang = document.getElementById('lang-sel').value;
            localStorage.setItem('rs_lang', state.lang);
            updateLangUI();
            nav(state.tab);
            showToast(i18n[state.lang].toast_lang, 'globe');
        }

        function updateLangUI() {
            const current = i18n[state.lang];
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if (current[key]) el.innerText = current[key];
            });
            document.getElementById('m-reset-title').innerText = current.m_reset_title;
            document.getElementById('m-reset-desc').innerText = current.m_reset_desc;
        }

        function saveAll() {
            state.theme = document.getElementById('theme-sel').value;
            state.fx = document.getElementById('fx-check').checked;
            localStorage.setItem('rs_theme', state.theme);
            localStorage.setItem('rs_fx', state.fx);
            applySettings();
            showToast(i18n[state.lang].toast_saved, 'check-circle');
            document.getElementById('page-title').innerText = i18n[state.lang]['page_' + state.tab];
        }

        function applySettings() {
            document.body.setAttribute('data-theme', state.theme);
            document.body.setAttribute('data-fx', state.fx ? 'on' : 'off');
        }

        function showToast(text, icon = 'info-circle') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${text}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM(id) { document.getElementById(id).classList.remove('active'); }
        
        function confirmReset() {
            state.stats = 0;
            localStorage.setItem('rs_stats', 0);
            document.getElementById('count-display').innerText = 0;
            closeM('modal-reset');
            showToast(i18n[state.lang].toast_reset, 'trash');
        }

        window.onload = init;
    </script>
</body>
</html>
