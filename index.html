<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Монетки GoreBox</title>
</head>
<body>
  <h1>Монетки: <span id="coins">0</span></h1>
  <button id="plusOne">+1</button>

  <script>
    // Твой реальный URL сервиса на Railway
    const url = "https://gbcatalog-production-0dc1.up.railway.app/";

    // Функция для загрузки текущего значения монет
    function loadCoins() {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          document.getElementById("coins").innerText = data.coins;
        })
        .catch(err => console.error("Ошибка загрузки монет:", err));
    }

    // Загружаем значение при открытии страницы
    loadCoins();

    // Кнопка +1
    document.getElementById("plusOne").addEventListener("click", () => {
      fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount: 1 })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("coins").innerText = data.coins;
      })
      .catch(err => console.error("Ошибка обновления монет:", err));
    });
  </script>
</body>
</html>
