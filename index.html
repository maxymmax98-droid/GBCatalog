<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление статусом</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .status-display {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 8px;
            background: #f9f9f9;
            font-weight: bold;
        }

        .status-value {
            transition: color 0.3s ease;
        }

        .status-on { color: var(--success); }
        .status-off { color: var(--danger); }
        .status-loading { color: #999; }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-on { background-color: var(--success); }
        .btn-off { background-color: var(--danger); }

        .error-message {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        .mock-notice {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Управление системой</h1>
        
        <div class="status-display">
            Статус: <span id="statusValue" class="status-loading">Загрузка...</span>
        </div>

        <div class="controls">
            <button id="btnOn" class="btn-on" onclick="handleSetStatus('ON')">ON</button>
            <button id="btnOff" class="btn-off" onclick="handleSetStatus('OFF')">OFF</button>
        </div>

        <div id="errorMessage" class="error-message">Ошибка соединения с сервером</div>
        
        <div class="mock-notice">
            * Если API_URL не задан, используется демо-режим (эмуляция бэкенда)
        </div>
    </div>

    <script>
        /**
         * КОНФИГУРАЦИЯ
         * Укажите здесь ваш реальный URL, например: 'http://localhost:3000'
         * Если оставить пустую строку или некорректный URL, сработает Demo-режим.
         */
        const API_URL = ''; 

        // Переменные для Demo-режима (эмуляция бэкенда)
        let mockStatus = 'OFF';
        const isDemoMode = !API_URL || API_URL.includes('your-backend-api.com');

        const statusEl = document.getElementById('statusValue');
        const errorEl = document.getElementById('errorMessage');

        /**
         * Получение текущего статуса (GET /get-status)
         */
        async function fetchStatus() {
            try {
                let status;
                
                if (isDemoMode) {
                    // Эмуляция задержки сети и возврата данных
                    await new Promise(resolve => setTimeout(resolve, 300));
                    status = mockStatus;
                } else {
                    const response = await fetch(`${API_URL}/get-status`);
                    if (!response.ok) throw new Error('Ошибка сервера');
                    const data = await response.json();
                    status = data.status;
                }
                
                updateUI(status);
                errorEl.style.display = 'none';
            } catch (error) {
                console.error('Fetch error:', error);
                errorEl.style.display = 'block';
                statusEl.textContent = '???';
                statusEl.className = 'status-loading';
            }
        }

        /**
         * Отправка нового статуса (POST /set-status)
         */
        async function handleSetStatus(newStatus) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            try {
                if (isDemoMode) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    mockStatus = newStatus;
                } else {
                    const response = await fetch(`${API_URL}/set-status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    if (!response.ok) throw new Error('Ошибка при сохранении');
                }
                
                updateUI(newStatus);
                errorEl.style.display = 'none';
            } catch (error) {
                console.error('Post error:', error);
                errorEl.style.display = 'block';
            } finally {
                buttons.forEach(b => b.disabled = false);
            }
        }

        /**
         * Обновление интерфейса
         */
        function updateUI(status) {
            statusEl.textContent = status;
            statusEl.className = status === 'ON' ? 'status-on' : (status === 'OFF' ? 'status-off' : 'status-loading');
        }

        // Запуск при загрузке
        window.onload = () => {
            fetchStatus();
            // Интервал опроса сервера — 2 секунды
            setInterval(fetchStatus, 2000);
        };
    </script>
</body>
</html>
