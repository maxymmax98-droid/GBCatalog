<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoreBox Catalog</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
@font-face {
  font-family: 'Kenyan Coffee';
  src: url('Kenyan Coffee Bd It.otf') format('opentype');
}

:root{
  --bg:#07070c;
  --panel:#11111a;
  --card:#1c1c28;
  --accent:#8b5cff;
  --danger:#ff2b2b;
  --text:#e6e6f0;
  --muted:#7a7a9a;
}

body, * {user-select: none;}
body { 
  margin:0;
  font-family: 'Kenyan Coffee', Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1630, #07070c);
  color: var(--text);
  display:flex;
  min-height:100vh;
}

/* --- SIDEBAR --- */
.sidebar{
  width:220px;
  background: var(--panel);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0;
  gap:20px;
  box-shadow:2px 0 20px rgba(0,0,0,.7);
}
.sidebar button{
  background: var(--panel);
  color: var(--text);
  border:none;
  padding:12px 20px;
  width:80%;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
  text-align:left;
  display:flex;
  align-items:center;
  gap:10px;
}
.sidebar button:hover{
  transform:translateX(5px);
  box-shadow:0 0 15px var(--accent);
}
.sidebar button.active{
  background: var(--accent);
  color:black;
}

/* --- MAIN --- */
.main{
  flex:1;
  padding:30px 20px;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
}

/* --- SETTINGS PANEL --- */
.settings-bar{
  background: var(--panel);
  padding:15px 20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,.7);
  margin-bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.settings-bar label{
  font-size:14px;
  cursor:pointer;
}

/* --- GRID --- */
.grid{
  display:none;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  margin-top:20px;
}
.grid.active{display:grid}

/* --- CARD --- */
.card{
  background: linear-gradient(180deg,#1b1b28,#11111a);
  border: 2px solid var(--accent);
  padding:22px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.7);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
  transform: translateY(-6px);
  box-shadow: 0 14px 35px rgba(123,92,255,0.6);
}
.card h3{
  margin:0 0 12px;
  font-size:22px;
}
.card p{
  font-size:14px;
  color:var(--muted);
  margin:0 0 15px;
}
.card .buttons{
  display:flex;
  justify-content:center;
  gap:12px;
}
.card button{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
  transition:0.2s;
}
.card button .icon{ font-size:16px;}
.card .info{ background:var(--accent); color:black;}
.card .screenshots{ background:#4444ff; color:white;}
.card .download{ background:var(--danger); color:black; box-shadow:0 0 28px rgba(255,43,43,.7);}

/* SCARY FX */
.scary{ color:#ff3b3b; animation:flicker 2s infinite;}
@keyframes flicker{0%{text-shadow:0 0 4px red}50%{text-shadow:0 0 25px red}100%{text-shadow:0 0 4px red}}

/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
.modal-content{
  background:var(--panel);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:left;
  position:relative;
}
.modal-content h2{margin-top:0;}
.close-modal{
  position:absolute;
  top:10px; right:15px;
  cursor:pointer;
  font-size:20px;
  color:var(--text);
}

/* FOOTER */
.footer{margin-top:30px; padding:25px; font-size:14px; text-align:center; color:var(--muted);}

/* MOBILE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{width:100%; flex-direction:row; flex-wrap:wrap; justify-content:center; box-shadow:0 2px 15px rgba(0,0,0,.5);}
  .sidebar button{width:auto;}
  .main{padding:20px 10px;}
}
</style>
</head>
<body>

<div class="sidebar">
  <button class="active" onclick="openTab('popular', this)"><i class="fas fa-star"></i> Популярное</button>
  <button onclick="openTab('weapons', this)"><i class="fas fa-crosshairs"></i> Оружие</button>
  <button onclick="openTab('maps', this)"><i class="fas fa-map"></i> Карты</button>
  <button onclick="openTab('scary', this)"><i class="fas fa-skull-crossbones"></i> Страшное</button>
</div>

<div class="main">
  <div class="settings-bar">
    <label><input type="checkbox" id="effectsToggle" checked> Включить эффекты</label>
  </div>

  <div id="popular" class="grid active">
    <div class="card"><p>Нет доступных модов</p></div>
  </div>

  <div id="weapons" class="grid">
    <div class="card"><p>Нет доступных модов</p></div>
  </div>

  <div id="maps" class="grid">
    <div class="card"><p>Нет доступных модов</p></div>
  </div>

  <div id="scary" class="grid">
    <div class="card" id="scaryCard">
      <h3 class="scary"><i class="fas fa-skull-crossbones"></i> Скример мод</h3>
      <p>Не для слабонервных</p>
      <div class="buttons">
        <button class="download" onclick="downloadMod()"><i class="fas fa-download icon"></i> Скачать</button>
        <button class="info" id="openInfoModal"><i class="fas fa-info-circle icon"></i> Инфо</button>
        <button class="screenshots"><i class="fas fa-image icon"></i> Скриншоты</button>
      </div>
    </div>
  </div>

  <div class="footer">By REisain</div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <span class="close-modal" id="closeModal">&times;</span>
    <h2>Скример Мод - Информация</h2>
    <p><b>?test</b> → активирует скример</p>
    <p><b>i</b> или <b>?s</b> → активирует сейф мод</p>
  </div>
</div>

<script>
// Вкладки
function openTab(id, btn){
  document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  
  document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// Скачать (mod.zip лежит рядом с index.html)
function downloadMod() {
  window.location.href = 'mod.zip'; // просто файл в той же папке
}

// Эффекты
const effectsToggle = document.getElementById('effectsToggle');
effectsToggle.addEventListener('change', function() {
    const cards = document.querySelectorAll('.card');
    const scare = document.querySelectorAll('.scary');
    const buttons = document.querySelectorAll('.card button');
    if(this.checked){
        cards.forEach(c => {c.style.transition=''; c.style.transform=''; c.style.boxShadow='';});
        scare.forEach(s => s.style.animation='flicker 2s infinite');
        buttons.forEach(b => b.style.boxShadow='');    
    }else{
        cards.forEach(c => {c.style.transition='none'; c.style.transform='none'; c.style.boxShadow='none';});
        scare.forEach(s => s.style.animation='none');
        buttons.forEach(b => b.style.boxShadow='none');
    }
});

// Модалка
const modal = document.getElementById('infoModal');
document.getElementById('openInfoModal').onclick = ()=>modal.style.display='flex';
document.getElementById('closeModal').onclick = ()=>modal.style.display='none';
window.onclick = (e)=>{ if(e.target==modal) modal.style.display='none'; }

// Команды клавиш
document.addEventListener('keydown', (e)=>{
  const key = e.key.toLowerCase();
  if(key === 'i'){ alert('Сейф мод активирован ✅'); }
});
document.addEventListener('keypress', (e)=>{
  const input = e.key.toLowerCase();
  if(input === 's'){ alert('Сейф мод активирован ✅'); }
});
</script>

</body>
</html>
