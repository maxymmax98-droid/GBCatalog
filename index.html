<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат-переписка</title>
<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #1E1E1E;
    color: #fff;
}

body {
    display: flex;
    flex-direction: column;
}

.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background-color: #1E1E1E;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 15px;
    word-wrap: break-word;
    font-size: 14px;
}

.self {
    background-color: #0088FF;
    align-self: flex-end;
    border-bottom-right-radius: 0;
}

.other {
    background-color: #3A3A3A;
    align-self: flex-start;
    border-bottom-left-radius: 0;
}

.message-username {
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 5px;
    display: block;
    color: #ccc;
}

.input-container {
    display: flex;
    padding: 10px;
    border-top: 1px solid #444;
    background: #2A2A2A;
    gap: 5px;
}

input[type="text"] {
    flex: 1 1 auto;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    outline: none;
    background: #1E1E1E;
    color: #fff;
    font-size: 14px;
}

input[type="text"]::placeholder {
    color: #888;
}

button {
    flex-shrink: 0;
    padding: 10px 15px;
    border: none;
    background-color: #0088FF;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background-color: #006FCC;
}

@media(max-width:600px){
    input[type="text"] { font-size:12px; padding:8px 12px; }
    button { font-size:12px; padding:8px 10px; }
}
</style>
</head>
<body>

<div class="chat">
    <div id="messages" class="messages"></div>
    <div class="input-container">
        <input type="text" id="username" placeholder="Ваше имя">
        <input type="text" id="message-input" placeholder="Введите сообщение">
        <button id="send-btn">Отправить</button>
    </div>
</div>

<script>
const messagesDiv = document.getElementById('messages');
const sendBtn = document.getElementById('send-btn');
const messageInput = document.getElementById('message-input');
const usernameInput = document.getElementById('username');

const SERVER_URL = 'https://your-server-url/messages'; // поставь сюда URL сервера

sendBtn.addEventListener('click', () => {
    const message = messageInput.value.trim();
    const username = usernameInput.value.trim() || 'Гость';
    if(!message) return;

    fetch(SERVER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username, message})
    }).then(()=>messageInput.value='');
});

function fetchMessages(){
    fetch(SERVER_URL)
    .then(res=>res.json())
    .then(data=>{
        messagesDiv.innerHTML='';
        data.forEach(msg=>{
            const msgDiv=document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(msg.username===usernameInput.value?'self':'other');

            const usernameSpan=document.createElement('span');
            usernameSpan.classList.add('message-username');
            usernameSpan.textContent=msg.username;

            msgDiv.appendChild(usernameSpan);
            msgDiv.appendChild(document.createTextNode(msg.message));
            messagesDiv.appendChild(msgDiv);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

setInterval(fetchMessages, 2000);
</script>

</body>
</html>
